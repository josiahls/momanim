[workspace]
authors = ["Josiah Laivins <jklaivins@gmail.com>"]
channels = [
    "https://conda.modular.com/max-nightly", 
    "https://repo.prefix.dev/modular-community", 
    "conda-forge",
]
name = "momanim"
platforms = ["linux-64", "linux-aarch64"]
version = "0.0.1"
license = "Apache-2.0"
license-file = "LICENSE"
homepage = "https://github.com/josiahls/momanim"
repository = "https://github.com/josiahls/momanim"
preview = ["pixi-build"]

[package]
name = "momanim"
version = "0.0.1"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.1.*" }

[package.host-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[package.build-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[package.run-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[dependencies]
# Static version pin for now since Mojo nightly has high churn.
pre-commit = ">=4.5.0,<5"
git = ">=2.53.0"
openssh = ">=9.0"

[feature.openh264.dependencies]
openh264 = "==2.6.0"

# MAV is pinned to mojo 0.26.2.x; keep it out of `stdlib-dev` (nightly mojo-compiler).
[feature.mav.dependencies]
mav = "==0.0.4"
mojo = "==0.26.2.0,<0.27"

# Manim Community (Python) for reference renders / examples — use: pixi run -e manim <cmd>
# Note: conda-forge often resolves ffmpeg *lgpl*, which has no libx264. Default output uses
# --format webm (VP9 partial segments). For H.264/mp4, install a GPL ffmpeg build on your machine
# or override the manim env’s ffmpeg pin (e.g. linux-64: { version = "==8.0.1", build = "*_gpl*" }).
[feature.manim.dependencies]
manim = ">=0.20.0"
ffmpeg = "*"

[feature.manim.tasks.render_square_to_circle]
cmd = [
    "manim",
    "-ql",
    "--format",
    "webm",
    "example_square_to_circle.py",
    "SquareToCircle",
]

[activation.env]
LIBRARY_PATH = "$CONDA_PREFIX/lib:$LIBRARY_PATH"
MAV_INCLUDES = " -I . -I third_party/NuMojo"
MAV_LINKERS = " -Xlinker -lavutil -Xlinker -lavcodec -Xlinker -lswresample -Xlinker -lswscale -Xlinker -lavformat -Xlinker -lm"
MOJO_COMPILE_FLAGS = "$MAV_LINKERS $MAV_INCLUDES"
MOJO_DEBUG_COMPILE_FLAGS = "$MOJO_COMPILE_FLAGS --debug-level=line-tables -DASSERT=all"
MOJO_ENABLE_STACK_TRACE_ON_ERROR="1"
LOGGING_LEVEL="DEBUG"

[environments]
default = ["mav"]
use-openh264 = ["openh264", "mav"]
manim = ["manim"]
stdlib-dev = ["stdlib-dev"]

[package.build.config]
extra-args = [ "$MAV_LINKERS", "$MAV_INCLUDES" ]

[tasks]
########################## Pre-commit Configuration ############################
install_pre_commit_hooks = { cmd = [
    "pre-commit", "install"
], outputs = [".git/hooks/pre-commit"]}

conda_build = { cmd = "pixi build -o dist/" }
conda_auth = { cmd = "pixi auth login anaconda.org  --conda-token $CONDA_TOKEN"}
publish = { cmd = "find dist/ -name 'momanim-*.conda' | xargs pixi upload anaconda --api-key $CONDA_TOKEN --owner josiahls" }
conda_build_and_publish = [{ task = "conda_build" }, { task = "publish" }]


############################ Git Ops ###########################################
push = "git push --force-with-lease"

[tasks.rebase]
cmd = "git rebase -i HEAD~{{ n_commits }}"
args = [{ arg = "n_commits", default = "1" }]

############################### Env setup ######################################

[tasks.configure_lldb]
cmd = "bash tools/configure_lldb.sh"

######################## Test Data Generation API ##############################
[tasks.generate_test_videos]
cmd = "bash tools/generate_test_videos.sh"

############################### Core API #######################################
[tasks.configure]
depends-on = [ "install_pre_commit_hooks", "generate_test_videos" ]

[tasks.package]
cmd = "mojo package $MAV_INCLUDES momanim"
depends-on = [ "configure" ]

[tasks.build]
cmd = "mojo build $MOJO_COMPILE_FLAGS {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_debug]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_valgrind]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS --march=x86-64-v2 {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_sanitize]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS --sanitize=address {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.format]
cmd = "mojo format momanim"

[tasks.valgrind]
cmd = "valgrind --leak-check=full --track-origins=yes -s $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ { task = "build_valgrind", args = ["{{ file }}"] } ]

[tasks.debug]
cmd = "mojo debug ./$(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ "configure_lldb" ]

[tasks.test_no_config]
cmd = "./$(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ { task = "build_debug", args = ["{{ file }}"] } ]

[tasks.run]
cmd = "./$(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ { task = "build", args = ["{{ file }}"] } ]

[tasks.test]
args = ["file"]
depends-on = [ 
    "configure",  
    { task = "test_no_config", args = ["{{ file }}"] }
]

[feature.openh264.tasks.test_all]
cmd = "mojo run run_tests.mojo"
depends-on = [ "configure" ]


[feature.stdlib-dev.activation.env]
MODULAR_MOJO_MAX_IMPORT_PATH="$PIXI_PROJECT_ROOT/third_party/modular/bazel-bin"
# MOJO_ENABLE_STACK_TRACE_ON_ERROR="1"

[feature.stdlib-dev.dependencies]
openh264 = "==2.6.0"
mojo-compiler = "==0.26.3.0.dev2026040320,<0.27"

[feature.stdlib-dev.tasks]
update_stdlib = { cmd = [
    "cd", "third_party/modular", "&&",
    "./bazelw", "build", "//mojo/stdlib/std"
]}

clean_update_stdlib = { cmd = [
    "cd", "third_party/modular", "&&",
    "git", "switch", "main", "&&",
    "git", "fetch", "origin", "&&",
    "git", "reset", "--hard", "origin/main", "&&",
    "./bazelw", "build", "//mojo/stdlib/..."
]}

test_stdlib = { cmd = [
    "mojo", "run", "{{ file }}"
], depends-on = [ "update_stdlib" ], args = ["file"]}