[workspace]
authors = ["Josiah Laivins <jklaivins@gmail.com>"]
channels = [
    "https://conda.modular.com/max-nightly", 
    "https://repo.prefix.dev/modular-community", 
    "conda-forge",
    "josiahls"
]
name = "momanim"
platforms = ["linux-64", "linux-aarch64"]
version = "0.0.1"
license = "Apache-2.0"
license-file = "LICENSE"
homepage = "https://github.com/josiahls/momanim"
repository = "https://github.com/josiahls/momanim"
preview = ["pixi-build"]

[package]
name = "momanim"
version = "0.0.1"

[package.build]
backend = { name = "pixi-build-mojo", version = "0.1.*" }

[package.host-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[package.build-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[package.run-dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo-compiler = "==0.26.2.0,<0.27"
mav = "==0.0.4"

[dependencies]
# Static version pin for now since Mojo nightly has high churn.
mojo = "==0.26.2.0,<0.27"
mav = "==0.0.4"
pre-commit = ">=4.5.0,<5"
git = ">=2.53.0"
openssh = ">=9.0"

[feature.openh264.dependencies]
openh264 = "==2.6.0"

[environments]
default = []
use-openh264 = ["openh264"]

[package.build.config]
extra-args = [ "$MAV_LINKERS", "$MAV_INCLUDES" ]

[tasks]
########################## Pre-commit Configuration ############################
install_pre_commit_hooks = { cmd = [
    "pre-commit", "install"
], outputs = [".git/hooks/pre-commit"]}

conda_build = { cmd = "pixi build -o dist/" }
conda_auth = { cmd = "pixi auth login anaconda.org  --conda-token $CONDA_TOKEN"}
publish = { cmd = "find dist/ -name 'mav-*.conda' | xargs pixi upload anaconda --api-key $CONDA_TOKEN --owner josiahls" }
conda_build_and_publish = [{ task = "conda_build" }, { task = "publish" }]


############################ Git Ops ###########################################
push = "git push --force-with-lease"

[tasks.rebase]
cmd = "git rebase -i HEAD~{{ n_commits }}"
args = [{ arg = "n_commits", default = "1" }]

############################### Env setup ######################################

[tasks.configure_lldb]
cmd = "bash tools/configure_lldb.sh"

######################## Test Data Generation API ##############################
[tasks.generate_test_videos]
cmd = "bash tools/generate_test_videos.sh"

############################### Core API #######################################
[tasks.configure]
depends-on = [ "install_pre_commit_hooks", "generate_test_videos" ]

[tasks.package]
cmd = "mojo package $MAV_INCLUDES mav"
depends-on = [ "configure" ]

[tasks.build]
cmd = "mojo build $MOJO_COMPILE_FLAGS {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_debug]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_valgrind]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS --march=x86-64-v2 {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.build_sanitize]
cmd = "mojo build $MOJO_DEBUG_COMPILE_FLAGS --sanitize=address {{ file }} -o $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]

[tasks.format]
cmd = "mojo format mav"

[tasks.valgrind]
cmd = "valgrind --leak-check=full --track-origins=yes -s $(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ { task = "build_valgrind", args = ["{{ file }}"] } ]

[tasks.debug]
cmd = "mojo debug ./$(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ "configure_lldb" ]

[tasks.test_no_config]
cmd = "./$(tools/mojo_build_ex.sh {{ file }})"
args = ["file"]
depends-on = [ { task = "build_debug", args = ["{{ file }}"] } ]

[tasks.test]
args = ["file"]
depends-on = [ 
    "configure",  
    { task = "test_no_config", args = ["{{ file }}"] }
]

[feature.openh264.tasks.test_all]
cmd = "mojo run run_tests.mojo"
depends-on = [ "configure" ]
